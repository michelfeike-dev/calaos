<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>calaos — Log-Buch Story (Vorlage)</title>

  <!--
    ────────────────────────────────────────────────────────────────
    calaos · Instagram-Story-Vorlage für einen Logbuch-Eintrag (9:16)
    ────────────────────────────────────────────────────────────────
    So nutzt du sie (siehe auch README.md in diesem Verzeichnis):

    1) Unten im <script> den Block `const entry = { … }` mit dem
       gewünschten Eintrag füllen (Werte aus log.ts übernehmen).
       - teaser: KURZ halten (1–3 Sätze) — die Story ist ein Anriss,
         der volle Text lebt in log.ts / auf calaos.me/log.
       - nummer: fortlaufender Index des Eintrags (#1, #2, …).
    2) Diese Datei im Browser öffnen (Doppelklick).
    3) Oben links „Export 1080×1920" klicken (oder #export an die URL hängen)
       → Story wird exakt 1080×1920, ohne dunklen Rand.
    4) Nur die Story aufnehmen (kein schwarzer Rand, volle Auflösung):
       Safari → Einstellungen → Erweitert → „Funktionen für Webentwickler
         anzeigen" → Entwickler → Web-Inspector einblenden (Cmd+Opt+I)
         → Reiter „Elemente" → <div class="story"> per Rechtsklick
         → „Bildschirmfoto aufnehmen".
         (Safari hat KEIN Kamera-Symbol im Responsive-Modus.)
       Chrome/Edge → Rechtsklick auf die Story → „Untersuchen"
         → <div class="story"> per Rechtsklick → „Capture node screenshot".
    5) In Instagram als Story hochladen → Sticker → „Link"
       → https://calaos.me/log im unteren Bereich der Story platzieren.

    Hinweis: Instrument Serif wird per CDN geladen (nur beim lokalen
    Öffnen, nicht auf der Website). Ohne Netz greift ein Serif-Fallback.
    ────────────────────────────────────────────────────────────────
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #141414;
      --card: #1c1c1c;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #60a5fa;
      --fg: rgba(255, 255, 255, 0.90);
      --muted: rgba(255, 255, 255, 0.50);
      --faint: rgba(255, 255, 255, 0.30);
      --serif: "Instrument Serif", "Hoefler Text", "Iowan Old Style",
        "Palatino Linotype", Palatino, Georgia, serif;
      --sans: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 100svh;
      width: 100%;
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(96, 165, 250, 0.06), transparent 60%),
        #0b0b0b;
      padding: 2.5vmin;
    }

    /* 9:16 story frame, fits within the viewport on either axis */
    .story {
      --w: min(94vw, calc(94svh * 9 / 16));
      width: var(--w);
      height: calc(var(--w) * 16 / 9);
      container-type: size;
      position: relative;
      overflow: hidden;
      border-radius: 3cqw;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      box-shadow: 0 3vmin 9vmin rgba(0, 0, 0, 0.6);
    }

    .story::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(90% 45% at 50% 8%, rgba(96, 165, 250, 0.12), transparent 62%);
      pointer-events: none;
    }

    .inner {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      /* generous top padding keeps the logo clear of Instagram's profile chip */
      padding: 11cqh 8cqw 6cqh;
    }

    /* Header — small white wordmark + entry number near the top */
    .masthead {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3cqh;
    }

    .logo {
      display: block;
      width: 30cqw;
      height: auto;
    }

    .logo path {
      fill: #fff;
    }

    .index {
      font-size: 3cqw;
      font-weight: 500;
      letter-spacing: 0.34em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    /* Entry card — title is the hero, teaser is a short cliffhanger */
    .card {
      margin-top: 7cqh;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2px solid rgba(96, 165, 250, 0.32);
      border-radius: 3.2cqw;
      padding: 8cqw;
      box-shadow: 0 1.5cqw 5cqw rgba(0, 0, 0, 0.35);
    }

    .entry-title {
      margin: 0 0 4.5cqh;
      font-family: var(--serif);
      font-weight: 400;
      font-size: 9cqw;
      line-height: 1.02;
      letter-spacing: -0.02em;
      text-wrap: balance;
      color: var(--fg);
    }

    .entry-text {
      margin: 0;
      font-size: 3.5cqw;
      line-height: 1.7;
      color: var(--muted);
    }

    .entry-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6cqh;
      font-size: 2.7cqw;
      letter-spacing: 0.02em;
    }

    .entry-foot .place {
      color: var(--faint);
    }

    .entry-foot .date {
      color: var(--accent);
      opacity: 0.72;
    }

    /* ── Export mode — exact 1080×1920, no dark frame (for the screenshot) ── */
    .export-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      font: 500 13px/1 system-ui, -apple-system, sans-serif;
      color: #cbd5e1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 9px 13px;
      cursor: pointer;
    }

    body.is-export {
      background: var(--bg);
    }

    body.is-export .export-btn {
      display: none;
    }

    body.is-export .stage {
      display: block;
      min-height: 0;
      padding: 0;
      background: var(--bg);
    }

    body.is-export .story {
      width: 1080px;
      height: 1920px;
      border-radius: 0;
      box-shadow: none;
    }
  </style>
</head>

  <script>
    /* ─── HIER EINTRAG EINTRAGEN ──────────────────────────────────
       Werte aus log.ts übernehmen. `teaser` bewusst kurz halten
       (1–3 Sätze, Anriss), `nummer` = fortlaufender Index.          */
    const entry = {
      nummer: 2,
      titel: 'Niemand macht etwas',
      teaser:
        'Die Tränen laufen ihm herunter. Von Station zu Station beobachte ich ihn. Ich wünschte, ich könnte ihm helfen, ihn umarmen, menschlich sein. Ich zögere. Alle zögern. Niemand macht etwas. Wieso?',
      ort: 'Berlin',
      datum: '2026-07-22', // ISO (YYYY-MM-DD) — wird deutsch formatiert
    }
    /* ─────────────────────────────────────────────────────────── */

    const formatDatum = (iso) =>
      new Date(iso + 'T00:00:00').toLocaleDateString('de-DE', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
      })

    document.getElementById('index').textContent = '#' + entry.nummer
    document.getElementById('title').textContent = entry.titel
    document.getElementById('teaser').textContent = entry.teaser
    document.getElementById('place').textContent = entry.ort
    const dateEl = document.getElementById('date')
    dateEl.textContent = formatDatum(entry.datum)
    dateEl.setAttribute('datetime', entry.datum)

    /* Export-Modus: exakt 1080×1920 ohne Rahmen (per Button oder #export). */
    const setExport = (on) => document.body.classList.toggle('is-export', on)
    document
      .getElementById('exportBtn')
      .addEventListener('click', () =>
        setExport(!document.body.classList.contains('is-export'))
      )
    if (location.hash === '#export') setExport(true)
  </script>
